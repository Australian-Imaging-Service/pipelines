schema_version: '2.0'
title: Phantom vial signal metrics
version: &package_version "0.1.7"
authors:
  - name: Arkiev D'Souza
    email: arkiev@mq.edu.au
  - name: Thomas G. Close
    email: tom.g.close@gmail.com
docs:
  description: >-
    Pydra workflow for processing a single GSP SPIRIT phantom MRI session.

    Registers the phantom scan to the GSP SPIRIT template using iterative ANTs
    SyN registration with an orientation search, extracts per-vial signal
    statistics for all contrast images, and generates publication-quality plots.
  info_url: https://github.com/Australian-Imaging-Service/phantomkit
packages:
  pip:
    phantomkit: *package_version
    pydra: 1.0a7
  neurodocker:
    dcm2niix: v1.0.20240202
    mrtrix3: 3.0.2
    ants: 2.6.2
commands:
  all_metrics:
    operates_on: medimage/session
    task: phantomkit.protocols.vial_signal:VialSignalAnalysis
